# Desktop Application Quality Rules (Electron/Tauri)
# Comprehensive quality criteria for cross-platform desktop applications

version: 1.0.0
criteria_name: Desktop Application Quality
domain: desktop

priority_profiles:
  default:
    weight: 1.0
    description: Standard desktop application quality requirements

  desktop-first:
    weight: 2.0
    description: Projects focused primarily on desktop applications
    multipliers:
      desktop: 2.5
      frontend: 1.5
      security: 1.8

  cross-platform:
    weight: 2.2
    description: Projects targeting multiple desktop platforms (Windows, macOS, Linux)
    multipliers:
      desktop: 2.5
      testing: 1.8
      infrastructure: 1.3

  electron-app:
    weight: 2.0
    description: Electron-based desktop applications
    multipliers:
      desktop: 2.5
      frontend: 2.0
      security: 1.5

  tauri-app:
    weight: 2.0
    description: Tauri-based desktop applications (Rust backend)
    multipliers:
      desktop: 2.5
      backend: 1.8
      security: 1.8

# ============================================================================
# PHASE A: Critical Security & Architecture (must-pass)
# ============================================================================

phase_a:
  # -------------------------------------------------------------------------
  # Security: Process Isolation & Context Bridge
  # -------------------------------------------------------------------------
  - id: DESKTOP_A001
    severity: fail
    category: Security
    title: Enable Context Bridge for IPC Communication
    description: |
      Enable contextBridge to securely expose APIs from main process to renderer.
      Disabling or misconfiguring contextBridge exposes entire Node.js/Electron API
      to renderer process, creating severe security vulnerabilities.
    patterns:
      - file: "**/main.js"
        must_contain: "contextBridge"
      - file: "**/preload.js"
        must_contain: "contextBridge.exposeInMainWorld"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/context-isolation
      - https://tauri.app/v1/guides/security/

  - id: DESKTOP_A002
    severity: fail
    category: Security
    title: Enable Node Integration in Renderer Must Be Disabled
    description: |
      nodeIntegration must be disabled in renderer processes to prevent
      arbitrary code execution. With nodeIntegration enabled, renderer
      can access Node.js APIs directly.
    patterns:
      - file: "**/main.js"
        must_not_contain: "nodeIntegration: true"
      - file: "**/main.js"
        should_contain: "nodeIntegration: false"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/security

  - id: DESKTOP_A003
    severity: fail
    category: Security
    title: Enable Context Isolation for All Windows
    description: |
      contextIsolation must be enabled to prevent prototype pollution attacks
      and isolate renderer's JavaScript context from preload scripts.
    patterns:
      - file: "**/main.js"
        should_contain: "contextIsolation: true"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/context-isolation

  - id: DESKTOP_A004
    severity: fail
    category: Security
    title: Sandbox Renderer Processes
    description: |
      Enable sandbox mode for renderer processes to restrict system access.
      Sandboxed renderers cannot access Node.js APIs directly and must
      communicate via IPC.
    patterns:
      - file: "**/main.js"
        should_contain: "sandbox: true"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/sandbox

  - id: DESKTOP_A005
    severity: fail
    category: Security
    title: Validate All IPC Messages
    description: |
      All IPC messages from renderer must be validated on the main process
      before execution. Do not trust any input from renderer.
    patterns:
      - file: "**/main.js"
        should_contain: "ipcMain"
      - file: "**/main.js"
        should_contain_pattern: "(validate|sanitize|check|verify)"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/security

  - id: DESKTOP_A006
    severity: fail
    category: Security
    title: Disable Remote Module
    description: |
      The remote module is deprecated and dangerous. It allows renderer
      to access main process modules directly, bypassing security boundaries.
    patterns:
      - file: "**/main.js"
        must_not_contain: "require('@electron/remote')"
      - file: "**/renderer.js"
        must_not_contain: "require('@electron/remote')"
      - file: "**/preload.js"
        must_not_contain: "require('@electron/remote')"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/security

  # -------------------------------------------------------------------------
  # Security: Content Security & Permissions
  # -------------------------------------------------------------------------
  - id: DESKTOP_A007
    severity: fail
    category: Security
    title: Implement Content Security Policy (CSP)
    description: |
      Define strict CSP headers to prevent XSS attacks and restrict
      resource loading. CSP is critical for Electron apps loading web content.
    patterns:
      - file: "**/index.html"
        should_contain: "content-security-policy"
      - file: "**/main.js"
        should_contain: "Content-Security-Policy"
    examples:
      good: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
      bad: "default-src *"
    references:
      - https://content-security-policy.com
      - https://www.electronjs.org/docs/latest/tutorial/security

  - id: DESKTOP_A008
    severity: fail
    category: Security
    title: Restrict Navigation to Trusted URLs
    description: |
      Implement navigation handlers to prevent loading untrusted content.
      Only allow navigation to your application's domains.
    patterns:
      - file: "**/main.js"
        should_contain: "will-navigate"
      - file: "**/main.js"
        should_contain: "onHeadersReceived"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/security

  - id: DESKTOP_A009
    severity: fail
    category: Security
    title: Disable or Restrict DevTools in Production
    description: |
      DevTools should be disabled or restricted in production builds to prevent
      users from inspecting and modifying application behavior.
    patterns:
      - file: "**/main.js"
        should_contain: "openDevTools"
      - file: "**/main.js"
        should_contain_pattern: "(isDevelopment|isProd|process.env.NODE_ENV)"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/security

  - id: DESKTOP_A010
    severity: fail
    category: Security
    title: Securely Handle Native Modules
    description: |
      Native modules require special security considerations. Only use
      reputable native modules and audit their code.
    patterns:
      - file: "package.json"
        key: "dependencies"
        should_not_contain_unusual_native_modules: true
    references:
      - https://www.electronjs.org/docs/latest/tutorial/using-native-node-modules

  # -------------------------------------------------------------------------
  # Security: Secrets & Credentials
  # -------------------------------------------------------------------------
  - id: DESKTOP_A011
    severity: fail
    category: Security
    title: Never Hardcode Secrets in Desktop App Code
    description: |
      Desktop apps are distributed as binaries. Secrets hardcoded in source
      can be extracted by reverse engineering. Use secure storage APIs.
    patterns:
      - file: "**/*.js"
        must_not_contain: "api_key"
      - file: "**/*.js"
        must_not_contain: "secret_key"
      - file: "**/*.js"
        must_not_contain: "password="
      - file: "**/*.js"
        must_not_contain: "token="
    references:
      - https://www.electronjs.org/docs/latest/tutorial/security
      - https://tauri.app/v1/guides/security/

  - id: DESKTOP_A012
    severity: fail
    category: Security
    title: Use Platform Credential Storage
    description: |
      Use operating system's credential storage (Keychain on macOS, Credential
      Manager on Windows, Secret Service API on Linux) instead of storing
      credentials in plain text or app storage.
    patterns:
      - file: "**/main.js"
        should_contain: "(keytar|electron-store-safe|secure-electron-store)"
      - file: "**/main.js"
        should_contain_pattern: "(Keychain|CredentialManager|secret-storage)"
    references:
      - https://github.com/atom/node-keytar

  # -------------------------------------------------------------------------
  # Security: Auto-Update & Signing
  # -------------------------------------------------------------------------
  - id: DESKTOP_A013
    severity: fail
    category: Security
    title: Implement Secure Auto-Update Mechanism
    description: |
      Auto-updates must be cryptographically signed and verified before
      installation. Prevents man-in-the-middle attacks on updates.
    patterns:
      - file: "**/main.js"
        should_contain: "(autoUpdater|electron-updater)"
      - file: "**/main.js"
        should_contain: "setFeedURL"
      - file: "package.json"
        key: "build"
        should_exist: true
    references:
      - https://www.electronjs.org/docs/latest/tutorial/auto-updater
      - https://www.electron.build/auto-update

  - id: DESKTOP_A014
    severity: fail
    category: Security
    title: Code Sign Application Binaries
    description: |
      Application binaries must be code signed for distribution. Unsigned
      apps trigger security warnings on macOS and Windows.
    patterns:
      - file: "package.json"
        key: "build"
        should_contain: "certificateFile"
      - file: "electron-builder.json"
        should_exist: true
    references:
      - https://www.electronjs.org/docs/latest/tutorial/code-signing
      - https://www.electron.build/code-signing

  # -------------------------------------------------------------------------
  # Tauri-Specific Security
  # -------------------------------------------------------------------------
  - id: DESKTOP_A015
    severity: fail
    category: Security
    title: Configure Tauri CSP Correctly
    description: |
      Tauri requires strict CSP configuration in tauri.conf.json. The default
      restricts eval(), inline scripts, and dangerous sources.
    patterns:
      - file: "src-tauri/tauri.conf.json"
        key: "tauri.security.csp"
        should_exist: true
    references:
      - https://tauri.app/v1/guides/security/

  - id: DESKTOP_A016
    severity: fail
    category: Security
    title: Restrict Tauri API Allowlist
    description: |
      Only expose necessary Tauri APIs to frontend via allowlist configuration.
      Default-deny all APIs, explicitly enable only what's needed.
    patterns:
      - file: "src-tauri/tauri.conf.json"
        key: "tauri.allowlist"
        should_exist: true
    references:
      - https://tauri.app/v1/guides/features/

  # -------------------------------------------------------------------------
  # Architecture
  # -------------------------------------------------------------------------
  - id: DESKTOP_A017
    severity: fail
    category: Architecture
    title: Implement Proper Application Lifecycle Management
    description: |
      Handle application lifecycle events (ready, window-all-closed, activate,
      before-quit) properly for cross-platform compatibility.
    patterns:
      - file: "**/main.js"
        should_contain: "app.on('ready'"
      - file: "**/main.js"
        should_contain: "app.on('window-all-closed'"
      - file: "**/main.js"
        should_contain: "app.on('activate'"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/app-lifecycle

  - id: DESKTOP_A018
    severity: fail
    category: Architecture
    title: Prevent Multiple Application Instances
    description: |
      Implement single instance lock to prevent multiple app instances from
      running simultaneously, which can cause data corruption and confusion.
    patterns:
      - file: "**/main.js"
        should_contain: "app.requestSingleInstanceLock"
      - file: "**/main.js"
        should_contain: "app.on('second-instance'"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/app-lifecycle

# ============================================================================
# PHASE B: Best Practices & Performance (should-pass)
# ============================================================================

phase_b:
  # -------------------------------------------------------------------------
  # Performance: Resource Management
  # -------------------------------------------------------------------------
  - id: DESKTOP_B001
    severity: warn
    category: Performance
    title: Implement Memory Leak Prevention
    description: |
      Desktop apps run for long periods. Memory leaks accumulate and cause
      performance degradation. Properly clean up event listeners and references.
    patterns:
      - file: "**/renderer.js"
        should_contain: "(removeEventListener|cleanup|dispose)"
      - file: "**/main.js"
        should_contain: "garbage-collect"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/performance

  - id: DESKTOP_B002
    severity: warn
    category: Performance
    title: Lazy Load Non-Critical Modules
    description: |
      Lazy load modules that aren't needed immediately to reduce startup time
    and initial memory footprint.
    patterns:
      - file: "**/main.js"
        should_contain: "dynamic import"
      - file: "**/renderer.js"
        should_contain: "import("
    references:
      - https://www.electronjs.org/docs/latest/tutorial/performance

  - id: DESKTOP_B003
    severity: warn
    category: Performance
    title: Implement Efficient IPC Communication
    description: |
      Batch IPC calls, use synchronous IPC sparingly, and prefer one-way
      messages when response isn't needed.
    patterns:
      - file: "**/renderer.js"
        should_contain: "ipcRenderer.invoke"
      - file: "**/main.js"
        should_contain: "ipcMain.handle"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/ipc

  - id: DESKTOP_B004
    severity: warn
    category: Performance
    title: Enable V8 Optimization Flags
    description: |
      Enable V8 optimization flags for better JavaScript performance in
      renderer processes.
    patterns:
      - file: "**/main.js"
        should_contain: "app.commandLine.appendSwitch"
    examples:
      good: "app.commandLine.appendSwitch('--js-flags', '--max-old-space-size=4096')"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/performance

  - id: DESKTOP_B005
    severity: warn
    category: Performance
    title: Optimize Application Bundle Size
    description: |
      Large bundle sizes increase download time and disk usage. Use
      compression, code splitting, and remove unused dependencies.
    patterns:
      - file: "package.json"
        key: "build.compression"
        should_exist: true
      - file: "package.json"
        key: "build.asar"
        should_exist: true
    references:
      - https://www.electronjs.org/docs/latest/tutorial/performance

  # -------------------------------------------------------------------------
  # Performance: Graphics & Rendering
  # -------------------------------------------------------------------------
  - id: DESKTOP_B006
    severity: warn
    category: Performance
    title: Enable Hardware Acceleration
    description: |
      Hardware acceleration should be enabled for better graphics performance.
      Disable only if compatibility issues arise.
    patterns:
      - file: "**/main.js"
        should_contain: "app.disableHardwareAcceleration"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/performance

  - id: DESKTOP_B007
    severity: warn
    category: Performance
    title: Use Efficient Web Workers for Heavy Tasks
    description: |
      Offload heavy computation to Web Workers to prevent UI freezing.
      Never block main thread in renderer process.
    patterns:
      - file: "**/renderer.js"
        should_contain: "new Worker("
      - file: "**/renderer.js"
        should_contain: "worker.js"
    references:
      - https://developer.mozilla.org/en-US/docs/Web/API/Web_Workers_API

  - id: DESKTOP_B008
    severity: warn
    category: Performance
    title: Implement Virtual Scrolling for Large Lists
    description: |
      Use virtual scrolling for large data sets to render only visible items.
      Reduces DOM size and improves scrolling performance.
    patterns:
      - file: "package.json"
        key: "dependencies"
        should_contain: "(react-window|react-virtualized|vue-virtual-scroller)"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/performance

  # -------------------------------------------------------------------------
  # UX: Native Platform Integration
  # -------------------------------------------------------------------------
  - id: DESKTOP_B009
    severity: warn
    category: UX
    title: Implement Native Menus
    description: |
      Use platform-native menus (Menu API) for consistency with OS conventions.
      Include standard menu items (Edit, View, Help).
    patterns:
      - file: "**/main.js"
        should_contain: "Menu.buildFromTemplate"
      - file: "**/main.js"
        should_contain: "Menu.setApplicationMenu"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/native-ui

  - id: DESKTOP_B010
    severity: warn
    category: UX
    title: Implement Native System Tray
    description: |
      Use system tray (or taskbar) for quick access and background operation.
      Follow platform conventions for tray behavior.
    patterns:
      - file: "**/main.js"
        should_contain: "new Tray("
      - file: "**/main.js"
        should_contain: "tray.setToolTip"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/native-ui

  - id: DESKTOP_B011
    severity: warn
    category: UX
    title: Implement Native Notifications
    description: |
      Use native notification APIs (Notification API) instead of in-app
      notifications for better user experience.
    patterns:
      - file: "**/main.js"
        should_contain: "new Notification("
      - file: "**/renderer.js"
        should_contain: "new Notification("
    references:
      - https://www.electronjs.org/docs/latest/tutorial/native-ui

  - id: DESKTOP_B012
    severity: warn
    category: UX
    title: Implement Native File Dialogs
    description: |
      Use platform-native file dialogs (dialog API) instead of custom
      implementations for consistency and better UX.
    patterns:
      - file: "**/main.js"
        should_contain: "dialog.showOpenDialog"
      - file: "**/main.js"
        should_contain: "dialog.showSaveDialog"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/native-ui

  - id: DESKTOP_B013
    severity: warn
    category: UX
    title: Implement Native Window Controls
    description: |
      Use frame: true for native window controls (close, minimize, maximize)
      unless custom frame is required by design.
    patterns:
      - file: "**/main.js"
        should_contain: "frame:"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/window-customization

  - id: DESKTOP_B014
    severity: warn
    category: UX
    title: Implement Keyboard Shortcuts
    description: |
      Implement standard keyboard shortcuts (Cmd/Ctrl+C, Cmd/Ctrl+V, Cmd/Ctrl+Q)
      and provide customizable shortcuts for common actions.
    patterns:
      - file: "**/main.js"
        should_contain: "(globalShortcut|accelerator)"
      - file: "**/accelerators.js"
        should_exist: true
    references:
      - https://www.electronjs.org/docs/latest/tutorial/native-ui

  - id: DESKTOP_B015
    severity: warn
    category: UX
    title: Respect Platform UI Conventions
    description: |
      Follow platform-specific UI conventions (macOS traffic lights, Windows
      controls placement, menu bar location).
    patterns:
      - file: "**/main.js"
        should_contain: "process.platform"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/native-ui

  # -------------------------------------------------------------------------
  # UX: Window Management
  # -------------------------------------------------------------------------
  - id: DESKTOP_B016
    severity: warn
    category: UX
    title: Save and Restore Window State
    description: |
      Persist window position, size, and state across sessions. Users expect
      windows to reopen where they left them.
    patterns:
      - file: "**/main.js"
        should_contain: "(getPosition|getSize|setPosition|setSize)"
      - file: "**/store.js"
        should_contain: "(windowState|bounds)"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/window-customization

  - id: DESKTOP_B017
    severity: warn
    category: UX
    title: Implement Splash Screen for Slow Loading
    description: |
      Show splash screen if app takes more than 2 seconds to load. Perceived
      performance is as important as actual performance.
    patterns:
      - file: "**/main.js"
        should_contain: "splashScreen"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/window-customization

  - id: DESKTOP_B018
    severity: warn
    category: UX
    title: Support Multiple Monitors Correctly
    description: |
      Handle window positioning across multiple monitors correctly. Remember
      which monitor window was on.
    patterns:
      - file: "**/main.js"
        should_contain: "screen.getDisplayMatching"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/window-customization

  # -------------------------------------------------------------------------
  # Accessibility
  # -------------------------------------------------------------------------
  - id: DESKTOP_B019
    severity: warn
    category: Accessibility
    title: Support Screen Readers
    description: |
      Ensure application is accessible via screen readers. Use ARIA attributes
      and semantic HTML.
    patterns:
      - file: "**/index.html"
        should_contain: "(aria-|role=)"
      - file: "**/renderer.js"
        should_contain: "(aria|accessibility)"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/accessibility

  - id: DESKTOP_B020
    severity: warn
    category: Accessibility
    title: Support High Contrast and Dark Mode
    description: |
      Detect and respect system color scheme preferences. Support high
      contrast mode for better visibility.
    patterns:
      - file: "**/main.js"
        should_contain: "nativeTheme.shouldUseDarkColors"
      - file: "**/renderer.js"
        should_contain: "(prefers-color-scheme|dark-mode)"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/accessibility

  # -------------------------------------------------------------------------
  # Testing
  # -------------------------------------------------------------------------
  - id: DESKTOP_B021
    severity: warn
    category: Testing
    title: Implement Unit Tests for Main Process
    description: |
      Test main process logic (IPC handlers, window management, app lifecycle)
      with proper mocking of Electron APIs.
    patterns:
      - file: "**/*.test.js"
        should_exist: true
      - file: "package.json"
        key: "devDependencies"
        should_contain: "(spectron|electron-mocha)"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/testing

  - id: DESKTOP_B022
    severity: warn
    category: Testing
    title: Implement Integration Tests for IPC
    description: |
      Test IPC communication between main and renderer processes. Verify
      message passing, error handling, and async behavior.
    patterns:
      - file: "**/*.spec.js"
        should_exist: true
      - file: "**/*.test.js"
        should_contain: "(ipcMain|ipcRenderer)"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/testing

  - id: DESKTOP_B023
    severity: warn
    category: Testing
    title: Implement E2E Tests for User Workflows
    description: |
      Test complete user workflows (file operations, settings changes, data
      persistence) across main and renderer processes.
    patterns:
      - file: "**/e2e/**"
        should_exist: true
      - file: "package.json"
        key: "devDependencies"
        should_contain: "(playwright|spectron)"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/testing

  - id: DESKTOP_B024
    severity: warn
    category: Testing
    title: Test on All Target Platforms
    description: |
      Test application on all target platforms (Windows, macOS, Linux) to catch
      platform-specific bugs. Platform differences are common.
    patterns:
      - file: "**/.github/workflows/**"
        should_contain: "(windows|macos|linux)"
      - file: "**/ci.yml"
        should_contain: "test"
    references:
      - https://www.electronjs.org/docs/latest/tutorial/testing

  # -------------------------------------------------------------------------
  # Distribution & Packaging
  # -------------------------------------------------------------------------
  - id: DESKTOP_B025
    severity: warn
    category: Distribution
    title: Configure Application Metadata
    description: |
      Properly configure application metadata (name, version, description,
      author, license) in package.json and build config.
    patterns:
      - file: "package.json"
        key: "name"
        should_exist: true
      - file: "package.json"
        key: "version"
        should_exist: true
      - file: "package.json"
        key: "description"
        should_exist: true
      - file: "package.json"
        key: "author"
        should_exist: true
    references:
      - https://www.electronjs.org/docs/latest/tutorial/tutorial-packaging

  - id: DESKTOP_B026
    severity: warn
    category: Distribution
    title: Configure Application Icons
    description: |
      Provide high-quality application icons for all platforms (.ico for Windows,
      .icns for macOS, .png for Linux). Icons should be at least 512x512.
    patterns:
      - file: "build/**"
        should_exist: true
      - file: "build/icon.ico"
        should_exist: true
      - file: "package.json"
        key: "build.icon"
        should_exist: true
    references:
      - https://www.electronjs.org/docs/latest/tutorial/tutorial-packaging

  - id: DESKTOP_B027
    severity: warn
    category: Distribution
    title: Use ASAR Archive for Production
    description: |
      Package application code as ASAR archive for protection and performance.
      ASAR is the default and recommended format for Electron apps.
    patterns:
      - file: "package.json"
        key: "build.asar"
        should_exist: true
    references:
      - https://www.electronjs.org/docs/latest/tutorial/tutorial-packaging

  - id: DESKTOP_B028
    severity: warn
    category: Distribution
    title: Configure Installer for Windows
    description: |
