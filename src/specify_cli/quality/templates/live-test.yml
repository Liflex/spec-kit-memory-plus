name: "Live Test (Physical Verification)"
version: 1.2
description: >
  Physical, real-world verification of functionality. NOT synthetic/hypothetical checks.
  This criteria requires actually running the code, sending real requests, clicking real buttons,
  and verifying real results. No mocks, no stubs, no assumptions — only actual execution and
  observable outcomes.

  IMPORTANT FOR EVALUATOR: Every rule in this template MUST be verified by EXECUTING real actions:
  - For backend: start the server, send actual HTTP requests, check responses and database state
  - For frontend: launch a real browser (Playwright/Selenium), navigate pages, click buttons, fill forms
  - For database: run actual migrations, insert real data, verify constraints
  - For APIs: call real endpoints with synthetic payloads and assert the full request-response cycle
  "Looks correct in code" is NOT a passing check. Only "executed and produced expected result" passes.

