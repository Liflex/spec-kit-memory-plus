name: Database Migration
version: 1.0
description: Quality rules for database migration scripts (forward-only, rollback testing, transaction safety, idempotency)
priority_profiles:
  default:
    multipliers:
      web: 1.0
      api: 1.0
      data: 2.0
      infrastructure: 1.0
      mobile: 0.8
      ml: 0.5
      graphql: 1.0
      microservices: 1.2
      async: 1.0
      auth: 1.0
    category_multipliers: &id001
      security: 1.0
      performance: 1.0
      testing: 1.0
      documentation: 1.0
      code_quality: 1.0
      infrastructure: 1.0
      observability: 1.0
      reliability: 1.0
      cicd: 1.0
      correctness: 1.0
      accessibility: 1.0
      ux_quality: 1.0
  web-app:
    multipliers:
      web: 1.0
      api: 1.2
      data: 2.0
      infrastructure: 0.8
      mobile: 0.8
      ml: 0.5
      graphql: 1.0
      microservices: 0.8
      async: 1.0
      auth: 1.0
    category_multipliers: *id001
  mobile-app:
    multipliers:
      web: 0.8
      api: 1.3
      data: 2.0
      infrastructure: 0.8
      mobile: 1.0
      ml: 0.5
      graphql: 1.0
      microservices: 0.8
      async: 1.0
      auth: 1.0
    category_multipliers: *id001
  ml-service:
    multipliers:
      web: 0.3
      api: 0.8
      data: 2.0
      infrastructure: 1.0
      mobile: 0.3
      ml: 2.0
      graphql: 0.3
      microservices: 1.0
      async: 1.0
      auth: 0.5
    category_multipliers: *id001
  data-pipeline:
    multipliers:
      web: 0.2
      api: 0.8
      data: 2.0
      infrastructure: 1.3
      mobile: 0.2
      ml: 1.5
      graphql: 0.2
      microservices: 1.2
      async: 1.2
      auth: 0.5
    category_multipliers: *id001
  graphql-api:
    multipliers:
      web: 0.8
      api: 1.5
      data: 2.0
      infrastructure: 0.8
      mobile: 0.8
      ml: 0.5
