name: Cache
version: 1.0
description: Quality rules for caching systems (Redis, Memcached, CDN, in-memory caches) covering configuration, invalidation, security, and observability
priority_profiles:
  default:
    multipliers:
      web: 1.0
      api: 1.0
      data: 1.0
      infrastructure: 1.0
