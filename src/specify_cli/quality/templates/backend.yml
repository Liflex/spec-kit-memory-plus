      auth: 1.0
    category_multipliers:
      code_quality: 1.0
      security: 1.0
      performance: 1.0
      testing: 1.0
      documentation: 1.0
  web-app:
    multipliers:
      web: 1.2
      api: 1.5
      data: 1.2
      infrastructure: 0.8
      mobile: 0.8
      ml: 0.5
      graphql: 1.2
      microservices: 1.0
      async: 1.2
      auth: 1.5
    category_multipliers:
      code_quality: 1.0
      security: 1.5
      performance: 1.2
      testing: 1.0
      documentation: 1.0
  mobile-app:
    multipliers:
      web: 0.8
      api: 1.5
      data: 1.2
      infrastructure: 0.8
      mobile: 1.2
      ml: 0.5
      graphql: 1.0
      microservices: 1.0
      async: 1.2
      auth: 1.5
    category_multipliers:
      code_quality: 1.0
      security: 1.5
      performance: 1.3
      testing: 1.0
      documentation: 1.0
  ml-service:
    multipliers:
      web: 0.5
      api: 1.3
      data: 1.5
      infrastructure: 1.0
      mobile: 0.3
      ml: 2.0
      graphql: 0.5
      microservices: 1.2
      async: 1.3
      auth: 1.0
    category_multipliers:
      code_quality: 1.2
      security: 1.0
      performance: 1.5
      testing: 1.2
      documentation: 1.0
  data-pipeline:
    multipliers:
      web: 0.3
      api: 1.2
      data: 2.0
      infrastructure: 1.3
      mobile: 0.2
      ml: 1.5
      graphql: 0.3
      microservices: 1.3
      async: 1.5
      auth: 0.8
    category_multipliers:
      code_quality: 1.0
      security: 1.0
      performance: 2.0
      testing: 1.0
      documentation: 1.0
  graphql-api:
    multipliers:
      web: 1.0
      api: 1.5
      data: 1.3
      infrastructure: 0.8
      mobile: 0.8
      ml: 0.5
      graphql: 2.0
      microservices: 1.2
      async: 1.2
      auth: 1.3
    category_multipliers:
      code_quality: 1.0
      security: 1.3
      performance: 1.2
      testing: 1.0
      documentation: 1.2
  microservice:
    multipliers:
      web: 0.5
      api: 1.5
      data: 1.3
      infrastructure: 1.3
      mobile: 0.5
      ml: 0.8
      graphql: 1.2
      microservices: 2.0
      async: 1.5
      auth: 1.3
    category_multipliers:
      code_quality: 1.0
      security: 1.3
      performance: 1.3
